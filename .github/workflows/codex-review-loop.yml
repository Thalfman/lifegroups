name: Codex review loop

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number. If omitted, scan all open PRs.
        required: false
        type: string
      dry_run:
        description: Dry run mode. true/false.
        required: false
        default: "false"
        type: string
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
  pull_request_review:
    types:
      - submitted
  pull_request_review_comment:
    types:
      - created
      - edited
  issue_comment:
    types:
      - created
      - edited
  check_suite:
    types:
      - completed
  status:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

concurrency:
  group: codex-review-loop-${{ github.repository }}
  cancel-in-progress: false

jobs:
  codex-review-loop:
    name: Evaluate Codex review loop
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Codex review loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          CODEX_LOOP_PR_NUMBER: ${{ inputs.pr_number || '' }}
          CODEX_LOOP_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CODEX_ACTOR_LOGIN: ${{ vars.CODEX_ACTOR_LOGIN }}
          READY_NOTIFY_LOGIN: ${{ vars.READY_NOTIFY_LOGIN || 'Thalfman' }}
          CODEX_REVIEW_LOOP_ENABLED: ${{ vars.CODEX_REVIEW_LOOP_ENABLED || 'true' }}
          CODEX_FIX_ENABLED: ${{ vars.CODEX_FIX_ENABLED || 'true' }}
          CODEX_READY_NOTIFY_ENABLED: ${{ vars.CODEX_READY_NOTIFY_ENABLED || 'true' }}
          CODEX_QUIET_WINDOW_MINUTES: ${{ vars.CODEX_QUIET_WINDOW_MINUTES || '5' }}
          CODEX_MAX_FIX_CYCLES: ${{ vars.CODEX_MAX_FIX_CYCLES || '3' }}
          CODEX_MAX_FIX_CYCLES_PER_SHA: ${{ vars.CODEX_MAX_FIX_CYCLES_PER_SHA || '1' }}
        run: node scripts/codex-review-loop.mjs
