# RLS / action-pipeline INTEGRATION harness (issue #607) — scheduled + manual
# lane.
#
# PR gating for this harness lives in `ci.yml` (issue #811): the harness steps
# run inside the required "lint + typecheck + build + test" job behind a
# step-level changed-paths gate (`dorny/paths-filter`), so a red harness fails
# the required check directly. Step-level, because branch protection matches
# required checks on the exact job name and treats a skipped required JOB as
# satisfied — a separate path-filtered job could never reliably block. The
# RLS-relevant path list therefore lives in ci.yml now; keep this workflow's
# steps in lockstep with the copies there.
#
# What remains HERE is the safety net the PR gate can't provide: a scheduled
# weekly run (so RLS drift surfaces even on weeks with no RLS-touching PRs,
# and push-to-main is covered) plus the manual opt-in. The harness stands up a
# local Supabase CLI stack (`supabase start`), seeds one Auth user per
# oversight tier via the harness fixtures, and runs the `tests/integration/**`
# specs against REAL Row Level Security + the SECURITY DEFINER write pipeline.
# It needs NO production secrets: the local stack's keys are generated by the
# CLI and read out of `supabase status`.
#
# Coordination: this is the RLS harness workflow. The seeded-auth ROUTE-SMOKE
# workflow (issue #597) is a SEPARATE, distinctly-named file; the two do not
# share a workflow and neither rewrites the other's harness.
name: RLS Integration Harness

on:
  # Scheduled weekly (Mondays 06:00 UTC) so RLS drift surfaces even on weeks with
  # no RLS-touching PRs.
  schedule:
    - cron: "0 6 * * 1"
  # Manual opt-in from the Actions tab.
  workflow_dispatch:

# This lane exercises a live DB; never run more than one at a time.
concurrency:
  group: rls-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-integration:
    name: RLS + action-pipeline against local Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ ships a native global WebSocket, which @supabase/realtime-js
          # (pulled in by createClient in the harness fixtures) now requires —
          # on Node 20 it throws "Node.js 20 detected without native WebSocket
          # support" before any assertion runs.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start local Supabase stack
        run: supabase start

      - name: Export local stack credentials
        # `supabase status -o env` prints KEY="value" lines for the local stack.
        # We only ever use these LOCAL keys; no production secret is involved.
        # The service-role key is consumed solely by the test harness for fixture
        # provisioning — it is never imported into any Next runtime path.
        run: |
          supabase status -o env > stack.env
          {
            echo "RUN_RLS_INTEGRATION=true"
            echo "NEXT_PUBLIC_SUPABASE_URL=$(grep '^API_URL=' stack.env | cut -d= -f2- | tr -d '\"')"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(grep '^ANON_KEY=' stack.env | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(grep '^SERVICE_ROLE_KEY=' stack.env | cut -d= -f2- | tr -d '\"')"
          } >> "$GITHUB_ENV"

      - name: Run RLS / action-pipeline integration harness
        run: npm run test:integration

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup
