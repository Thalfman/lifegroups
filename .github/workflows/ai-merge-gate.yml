name: AI Merge Gate

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      dry_run:
        description: Dry run mode (true/false)
        required: false
        default: 'true'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  merge-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run merge gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          MERGE_GATE_PR_NUMBER: ${{ inputs.pr_number }}
          MERGE_GATE_DRY_RUN: ${{ inputs.dry_run || 'true' }}
          CODEX_ACTOR_LOGIN: ${{ vars.CODEX_ACTOR_LOGIN }}
          GEMINI_ACTOR_LOGIN: ${{ vars.GEMINI_ACTOR_LOGIN || 'gemini-code-assist[bot]' }}
        run: node scripts/ai-merge-gate.mjs
