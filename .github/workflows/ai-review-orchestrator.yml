name: AI Review Orchestrator

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run mode (true/false)
        required: false
        default: 'true'
        type: string
      pr_number:
        description: Optional PR number (scan all open PRs if omitted)
        required: false
        type: string
  schedule:
    - cron: '*/10 * * * *'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]
  status:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) &&
      (github.event_name != 'issue_comment' || (github.event.issue.pull_request != null && github.event.comment.user.login != 'github-actions[bot]')) &&
      (github.event_name != 'pull_request_review_comment' || github.event.comment.user.login != 'github-actions[bot]') &&
      (github.event_name != 'pull_request_review' || github.event.review.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Debug API access (posts results as PR #68 comment)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          LIST_STATUS=$(curl -sS -o /tmp/pulls.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls?state=open&per_page=1")
          PROBE_STATUS=$(curl -sS -o /tmp/probe.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/68/comments" \
            -d '{}')
          MSG="diag list=$LIST_STATUS probe=$PROBE_STATUS event=${GITHUB_EVENT_NAME} actor=${GITHUB_ACTOR} run=${GITHUB_RUN_ID}"
          echo "$MSG"
          POST_STATUS=$(curl -sS -o /tmp/posted.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/68/comments" \
            -d "{\"body\":\"<!-- ai-debug:probe --> $MSG\"}")
          echo "diagnostic post status: $POST_STATUS"
          echo "diagnostic post body (first 400b):"
          head -c 400 /tmp/posted.json; echo
      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ORCHESTRATOR_DRY_RUN: ${{ inputs.dry_run || 'true' }}
          ORCHESTRATOR_PR_NUMBER: ${{ inputs.pr_number || '' }}
          AI_REVIEW_AUTOMATION_ENABLED: ${{ vars.AI_REVIEW_AUTOMATION_ENABLED || 'true' }}
          AI_REVIEW_REQUEST_REVIEWS: ${{ vars.AI_REVIEW_REQUEST_REVIEWS || 'true' }}
          CODEX_ACTOR_LOGIN: ${{ vars.CODEX_ACTOR_LOGIN }}
          GEMINI_ACTOR_LOGIN: ${{ vars.GEMINI_ACTOR_LOGIN || 'gemini-code-assist[bot]' }}
          CLAUDE_TRIGGER: ${{ vars.CLAUDE_TRIGGER || '@claude' }}
          ALLOWED_PR_AUTHORS: ${{ vars.ALLOWED_PR_AUTHORS || '' }}
        run: node scripts/ai-review-orchestrator.mjs
