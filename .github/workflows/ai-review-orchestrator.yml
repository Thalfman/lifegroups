name: AI Review Orchestrator

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run mode (true/false)
        required: false
        default: 'true'
        type: string
      pr_number:
        description: Optional PR number (scan all open PRs if omitted)
        required: false
        type: string
  schedule:
    - cron: '*/10 * * * *'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]
  status:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) &&
      (github.event_name != 'issue_comment' || (github.event.issue.pull_request != null && github.event.comment.user.login != 'github-actions[bot]')) &&
      (github.event_name != 'pull_request_review_comment' || github.event.comment.user.login != 'github-actions[bot]') &&
      (github.event_name != 'pull_request_review' || github.event.review.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Debug API access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "::group::event=$GITHUB_EVENT_NAME actor=$GITHUB_ACTOR run=$GITHUB_RUN_ID"
          echo "list-pulls:"
          curl -sS -o /tmp/pulls.json -w "%{http_code}\n" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/pulls?state=open&per_page=1"
          echo "post-comment-probe (expect 422 invalid body, not 403):"
          curl -sS -o /tmp/probe.json -w "%{http_code}\n" -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/${{ github.event.pull_request.number || github.event.issue.number || 68 }}/comments" -d '{}'
          head -c 800 /tmp/probe.json; echo
          echo "::endgroup::"
      - name: Run orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ORCHESTRATOR_DRY_RUN: ${{ inputs.dry_run || 'true' }}
          ORCHESTRATOR_PR_NUMBER: ${{ inputs.pr_number || '' }}
          AI_REVIEW_AUTOMATION_ENABLED: ${{ vars.AI_REVIEW_AUTOMATION_ENABLED || 'true' }}
          AI_REVIEW_REQUEST_REVIEWS: ${{ vars.AI_REVIEW_REQUEST_REVIEWS || 'true' }}
          CODEX_ACTOR_LOGIN: ${{ vars.CODEX_ACTOR_LOGIN }}
          GEMINI_ACTOR_LOGIN: ${{ vars.GEMINI_ACTOR_LOGIN || 'gemini-code-assist[bot]' }}
          CLAUDE_TRIGGER: ${{ vars.CLAUDE_TRIGGER || '@claude' }}
          ALLOWED_PR_AUTHORS: ${{ vars.ALLOWED_PR_AUTHORS || '' }}
        run: node scripts/ai-review-orchestrator.mjs
