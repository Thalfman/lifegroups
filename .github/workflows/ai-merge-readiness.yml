name: AI Merge Readiness

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number (scan all open PRs if omitted)
        required: false
        type: string
      dry_run:
        description: Dry run mode (true/false)
        required: false
        default: 'false'
        type: string
  schedule:
    - cron: '5/10 * * * *'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited]
  issue_comment:
    types: [created, edited]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  readiness:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) &&
      (github.event_name != 'issue_comment' || (github.event.issue.pull_request != null && github.event.comment.user.login != 'github-actions[bot]')) &&
      (github.event_name != 'pull_request_review_comment' || github.event.comment.user.login != 'github-actions[bot]') &&
      (github.event_name != 'pull_request_review' || github.event.review.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run merge readiness
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MERGE_READINESS_PR_NUMBER: ${{ inputs.pr_number || '' }}
          MERGE_READINESS_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          AI_REVIEW_READY_NOTIFY_ENABLED: ${{ vars.AI_REVIEW_READY_NOTIFY_ENABLED || 'true' }}
          READY_NOTIFY_LOGIN: ${{ vars.READY_NOTIFY_LOGIN || 'Thalfman' }}
          CODEX_ACTOR_LOGIN: ${{ vars.CODEX_ACTOR_LOGIN }}
          GEMINI_ACTOR_LOGIN: ${{ vars.GEMINI_ACTOR_LOGIN || 'gemini-code-assist[bot]' }}
          ALLOWED_PR_AUTHORS: ${{ vars.ALLOWED_PR_AUTHORS || '' }}
          AI_REVIEW_REQUIRED_CHECKS: ${{ vars.AI_REVIEW_REQUIRED_CHECKS || 'lint + typecheck + test' }}
        run: node scripts/ai-merge-readiness.mjs
