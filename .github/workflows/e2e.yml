name: E2E happy-path lane

# E2E lane (#812): stands up a LOCAL seeded Supabase CLI stack (free, no
# production secrets), seeds the per-tier throwaway auth users, builds and
# serves the REAL app against it (no a11y harness, no stubbed actions), and
# drives the happy-path write specs in tests/e2e/ through the real
# form → server action → SECURITY DEFINER RPC pipeline under real RLS.
#
# PR STATUS: ALWAYS REPORTING. Every pull request gets this job context; an
# internal changed-paths gate skips the expensive local stack for unrelated
# changes while runtime, schema, Edge Function, harness, dependency, and
# toolchain changes run the real-stack specs. Branch-protection promotion is
# an external rollout step after this workflow reports green; never require a
# workflow-level path-filtered job.
#
# Coordinates with .github/workflows/seeded-auth-route-smoke.yml (#597): both
# source scripts/seeded-local-stack.sh for the stack/seed plumbing; this lane
# owns tests/e2e/** and playwright.e2e.config.ts.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Mondays 08:00 UTC (an hour after the route smoke) — a drift
    # check, not a merge gate.
    - cron: "0 8 * * 1"
  pull_request:

# Never run more than one E2E lane per ref at a time; a newer run supersedes.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# This workflow reads no repo secrets: the local Supabase CLI stack mints its
# own dev keys, and the throwaway test users are local-only.
permissions:
  contents: read
  pull-requests: read

jobs:
  e2e:
    name: local seeded Supabase + E2E specs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Detect E2E-relevant changes
        id: e2e-paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - "app/**"
              - "components/**"
              - "lib/**"
              - "proxy.ts"
              - "types/**"
              - "supabase/migrations/**"
              - "supabase/seed/**"
              - "supabase/functions/**"
              - "tests/e2e/**"
              - "scripts/patch-next-react-dom-36134.mjs"
              - "supabase/config.toml"
              - "playwright.e2e.config.ts"
              - "scripts/e2e.sh"
              - "scripts/ensure-local-edge-env.sh"
              - "scripts/seeded-local-stack.sh"
              - "scripts/seed-test-auth-users.ts"
              - "scripts/test-auth-shared.ts"
              - "package.json"
              - "package-lock.json"
              - ".nvmrc"
              - "next.config.ts"
              - "tsconfig.json"
              - ".github/workflows/e2e.yml"

      - name: Report E2E skip for unrelated changes
        if: github.event_name == 'pull_request' && steps.e2e-paths.outputs.e2e != 'true'
        run: echo "E2E context reported; expensive local-stack steps are not needed for these paths."

      - uses: actions/setup-node@v4
        if: github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci
        if: github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true'

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        if: github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true'

      - name: Install Supabase CLI
        if: github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start local Supabase stack
        # Applies every migration under supabase/migrations/ to a throwaway
        id: supabase-start
        if: github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true'
        # local Postgres + Auth. No remote project is linked.
        run: |
          . ./scripts/ensure-local-edge-env.sh
          supabase start
          echo "started=true" >> "$GITHUB_OUTPUT"

      - name: Run E2E lane
        # The runner reads the local stack's URL/keys from `supabase status`,
        if: github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true'
        # applies the operational seed, seeds throwaway Auth users, then serves
        # the real app and runs the tests/e2e/ Playwright specs.
        run: ./scripts/e2e.sh

      - name: Print failure page snapshots
        # The lane is only debuggable remotely: surface each failing test's
        # error-context.md (Playwright's ARIA snapshot of the page at failure,
        # which includes any role="alert" action-error text) straight in the
        # job log, so a diagnosis doesn't require downloading the artifact.
        if: failure() && (github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true')
        run: find test-results -name 'error-context.md' -print -exec cat {} \; || true

      - name: Upload Playwright report on failure
        if: failure() && (github.event_name != 'pull_request' || steps.e2e-paths.outputs.e2e == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: playwright-report-e2e
          retention-days: 7

      - name: Stop local Supabase stack
        if: always() && steps.supabase-start.outputs.started == 'true'
        run: supabase stop --no-backup || true
