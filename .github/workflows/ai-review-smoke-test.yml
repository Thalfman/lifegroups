name: AI Review Smoke Test

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Post smoke test comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed('pr_number must be a positive integer.');
              return;
            }

            const marker = `<!-- ai-review-smoke-test:${context.runId} -->`;
            const body = [
              '@claude Please acknowledge this smoke test only. Do not change code.',
              '@codex review',
              '/gemini review',
              '',
              marker,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
