# Minimal Supabase CLI config so `supabase functions deploy` can find the
# Edge Function in this repo. Pure deployment scaffolding — no runtime
# behaviour.

project_id = "lifegroups"

[functions.manage-test-auth-users]
verify_jwt = true

# Caller is an authenticated super_admin; the function re-verifies the JWT and
# the super_admin profile before doing any privileged work.
[functions.invite-user]
verify_jwt = true

# Public self-signup redemption: the invite token is the bearer credential, so
# the platform JWT gate is intentionally off and the function validates the
# token itself.
[functions.redeem-invite]
verify_jwt = false

# Auth config for the local stack (`supabase start`). The hosted project is
# configured in the Supabase dashboard; these entries keep local dev in parity
# so the password-reset flow can be exercised end-to-end locally.
[auth]
site_url = "http://127.0.0.1:3000"
# /reset-password is where recovery emails land (button-gated); /auth/confirm
# performs verifyOtp; /login is the post-reset destination.
additional_redirect_urls = [
  "http://127.0.0.1:3000/reset-password",
  "http://127.0.0.1:3000/auth/confirm",
  "http://127.0.0.1:3000/login",
]

# Recovery email uses a token_hash link to a server-side endpoint so email
# link-scanners can't consume the single-use token (see the template comment).
[auth.email.template.recovery]
subject = "Reset your password"
# Resolved relative to the project root (the dir containing supabase/), per the
# Supabase CLI / branching executor — hence the supabase/ prefix.
content_path = "./supabase/templates/recovery.html"
