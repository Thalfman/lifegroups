# Minimal Supabase CLI config so `supabase functions deploy` can find the
# Edge Function in this repo. Pure deployment scaffolding — no runtime
# behaviour.

project_id = "lifegroups"

# Local/test tooling only — must NEVER run in production. `enabled = false`
# makes every config-driven deploy path (blanket `supabase functions deploy`
# and the Supabase GitHub integration's deploy-to-production step, which
# deploys all functions declared in this file on every push to main) skip it.
# That integration is how the function silently returned to production on
# 2026-06-09 minutes after being deleted. Note `enabled = false` also stops
# the local stack from serving this function, so the Super-Admin
# test-accounts panel can't reach it locally. For local test-account
# seeding use `npm run seed:test-auth` / `npm run remove:test-auth`
# (standalone scripts, no Edge Function involved); if you specifically need
# the console panel, temporarily set `enabled = true` in your working copy
# and never commit that change.
[functions.manage-test-auth-users]
enabled = false
verify_jwt = true

# Caller is an authenticated super_admin; the function re-verifies the JWT and
# the super_admin profile before doing any privileged work.
[functions.invite-user]
verify_jwt = true

# Public self-signup redemption: the invite token is the bearer credential, so
# the platform JWT gate is intentionally off and the function validates the
# token itself.
[functions.redeem-invite]
verify_jwt = false

# Auth is configured in the Supabase dashboard, not here. We intentionally do
# NOT declare an [auth] block: Supabase Branching tries to apply config.toml
# auth settings to the ephemeral preview branch, and on the free tier with the
# default email provider that fails ("Email template modification is not
# available..."). Production merges ignore config.toml auth entirely.
#
# The recovery email template lives at supabase/templates/recovery.html as the
# canonical source to paste into Auth → Email Templates → Reset Password. The
# invite email template lives at supabase/templates/invite.html — paste it into
# Auth → Email Templates → "Invite user". Both deliberately use {{ .TokenHash }}
# + a /reset-password landing link (not the default {{ .ConfirmationURL }}) so a
# mail scanner's GET can't burn the single-use token and verification works
# cross-device. The required Redirect URLs (/reset-password, /auth/confirm,
# /login) and Site URL are set under Auth → URL Configuration.
#
# IMPORTANT: invite/reset emails only DELIVER reliably with a custom SMTP
# provider configured in the dashboard — Supabase's default sender is test-only.
# Full setup steps: docs/architecture/EMAIL_DELIVERY.md.
