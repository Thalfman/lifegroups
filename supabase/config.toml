# Minimal Supabase CLI config so `supabase functions deploy` can find the
# Edge Function in this repo. Pure deployment scaffolding — no runtime
# behaviour.

project_id = "lifegroups"

[functions.manage-test-auth-users]
verify_jwt = true

# Caller is an authenticated super_admin; the function re-verifies the JWT and
# the super_admin profile before doing any privileged work.
[functions.invite-user]
verify_jwt = true

# Public self-signup redemption: the invite token is the bearer credential, so
# the platform JWT gate is intentionally off and the function validates the
# token itself.
[functions.redeem-invite]
verify_jwt = false

# Auth is configured in the Supabase dashboard, not here. We intentionally do
# NOT declare an [auth] block: Supabase Branching tries to apply config.toml
# auth settings to the ephemeral preview branch, and on the free tier with the
# default email provider that fails ("Email template modification is not
# available..."). Production merges ignore config.toml auth entirely.
#
# The recovery email template lives at supabase/templates/recovery.html as the
# canonical source to paste into Auth → Email Templates → Reset Password. The
# required Redirect URLs (/reset-password, /auth/confirm, /login) and Site URL
# are set under Auth → URL Configuration.
